name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: gen-lang-client-0250661731
  REGION: us-central1
  SERVICE: product-handover
  AR_REPO: cloud-run-source-deploy
  WIF_PROVIDER: projects/141813993525/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: gh-actions-deploy@gen-lang-client-0250661731.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

concurrency:
  # Always deploy the newest commit. A newer push cancels any in-flight build
  # so the live revision matches the latest tip of main, not whatever raced.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE}"
          SHA_TAG="${IMAGE}:${GITHUB_SHA::7}"
          LATEST_TAG="${IMAGE}:latest"
          docker build -t "$SHA_TAG" -t "$LATEST_TAG" .
          docker push "$SHA_TAG"
          docker push "$LATEST_TAG"
          echo "IMAGE_SHA=$SHA_TAG" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE_SHA" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=1 \
            --memory=256Mi \
            --concurrency=80 \
            --quiet

      - name: Print service URL
        run: gcloud run services describe "$SERVICE" --region="$REGION" --format='value(status.url)'
